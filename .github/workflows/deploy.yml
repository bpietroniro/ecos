name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write  # required for OIDC
  contents: read

jobs:
  deploy-ecr:
    name: Deploy ECR Repository
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
    outputs:
      ecr-repository: ${{ steps.outputs.outputs.ecr-repository }}
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Build (TypeScript)
        run: npm run build

      - name: CDK deploy ECR stack
        run: npx cdk deploy EcosIngestionEcr --require-approval never --outputs-file cdk-outputs.json

      - name: Extract stack outputs
        id: outputs
        run: |
          echo "ecr-repository=$(jq -r '.EcosIngestionEcr.IngestionRepositoryUri' cdk-outputs.json)" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build & Push Ingestion Image
    runs-on: ubuntu-latest
    needs: deploy-ecr
    environment: prod
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
          IMAGE_URI: ${{ needs.deploy-ecr.outputs.ecr-repository }}
        run: |
          docker build \
            -t "$IMAGE_URI:${{ github.sha }}" \
            -t "$IMAGE_URI:latest" \
            services/ingestion
          docker push "$IMAGE_URI:${{ github.sha }}"
          docker push "$IMAGE_URI:latest"

  deploy-service:
    name: CDK Deploy Services
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: prod
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Build (TypeScript)
        run: npm run build

      - name: CDK deploy all stacks
        run: npx cdk deploy --all --require-approval never --outputs-file cdk-outputs.json

      - name: Force ECS redeployment
        run: |
          aws ecs update-service \
            --cluster "$(jq -r '.EcosIngestionService.IngestionClusterName' cdk-outputs.json)" \
            --service "$(jq -r '.EcosIngestionService.IngestionServiceName' cdk-outputs.json)" \
            --force-new-deployment \
            --region "${{ secrets.AWS_REGION }}"
