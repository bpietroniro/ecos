syntax = "proto3";

package ecos.ingestion.v1;

option go_package = "github.com/ecos/ingestion/proto/v1";

// Phase 2: gRPC service for inter-service communication.
// Generated code will be added when the Analysis Service needs
// to call the Data Ingestion Service directly.

message Location {
  double latitude = 1;
  double longitude = 2;
  double elevation = 3;
}

message Quality {
  string status = 1;
  repeated string flags = 2;
}

message SensorReading {
  string id = 1;
  string station_id = 2;
  string timestamp = 3;
  string reading_type = 4;
  double value = 5;
  string unit = 6;
  Quality quality = 7;
  Location location = 8;
  map<string, string> metadata = 9;
}

message GetReadingsRequest {
  string station_id = 1;
  string reading_type = 2;
  string start_time = 3;
  string end_time = 4;
  int32 limit = 5;
}

message GetReadingsResponse {
  repeated SensorReading readings = 1;
}

message SubmitReadingRequest {
  string station_id = 1;
  string timestamp = 2;
  string reading_type = 3;
  double value = 4;
  string unit = 5;
  Location location = 6;
  map<string, string> metadata = 7;
}

message SubmitReadingResponse {
  SensorReading reading = 1;
}

service IngestionService {
  rpc GetReadings(GetReadingsRequest) returns (GetReadingsResponse);
  rpc SubmitReading(SubmitReadingRequest) returns (SubmitReadingResponse);
}
